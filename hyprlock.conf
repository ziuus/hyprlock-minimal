background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    noise = 0.02
    contrast = 0.9
    brightness = 0.5
    vibrancy = 0.15
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span font_weight='light'>$(date +'%H:%M')</span>"
    color = rgba(255, 255, 255, 0.95)
    font_size = 120
    font_family = Inter
    position = 0, 200
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "<span font_weight='normal'>$(date +'%A, %B %d')</span>"
    color = rgba(255, 255, 255, 0.7)
    font_size = 18
    font_family = Inter
    position = 0, 80
    halign = center
    valign = center
}

# Input field
input-field {
    monitor =
    size = 350, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.4
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.1)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgba(255, 255, 255, 0.9)
    check_color = rgba(134, 192, 99, 0.8)
    fail_color = rgba(237, 135, 150, 0.8)
    fail_text = <span foreground="##ed8796">Failed ($ATTEMPTS)</span>
    fade_on_empty = true
    placeholder_text = <span foreground="##ffffff66">Enter password</span>
    hide_input = false
    rounding = 12
    position = 0, -120
    halign = center
    valign = center
}

# User
label {
    monitor =
    text =   $USER
    color = rgba(255, 255, 255, 0.6)
    font_size = 14
    font_family = Inter
    position = 0, -200
    halign = center
    valign = center
}
